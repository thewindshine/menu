<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3E6259">
<title>Our Dinner Plan</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFE7D8;
  --surface:#FBF8F1;
  --surface-2:#F3ECDD;
  --ink:#262A24;
  --ink-soft:#6B6F62;
  --jade:#3E6259;
  --jade-dark:#2C463F;
  --turmeric:#E8A33D;
  --chili:#C1440E;
  --line:#DDD2B8;
  --radius:18px;
  --shadow:0 6px 18px rgba(44,70,63,0.10);
  --app-w:560px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  overflow:hidden;
}
#app{
  max-width:var(--app-w);
  margin:0 auto;
  height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}
@media (min-width:700px){ :root{ --app-w:760px; } }
@media (min-width:960px){ :root{ --app-w:860px; } }
h1,h2,h3{font-family:'Fraunces',serif;margin:0;}
button{font-family:inherit;}
.topbar{
  position:sticky; top:0; z-index:20;
  background:var(--jade);
  color:#fff;
  padding:14px 18px calc(14px + env(safe-area-inset-top,0px));
  padding-top:calc(14px + env(safe-area-inset-top,0px));
  display:flex; align-items:center; justify-content:space-between;
}
.topbar .brand{display:flex;align-items:center;gap:10px;}
.settings-btn{
  background:rgba(255,255,255,.16); border:none; color:#fff;
  width:34px; height:34px; border-radius:10px; font-size:1.05rem; cursor:pointer; flex:none;
}
.topbar .brand-mark{
  width:34px;height:34px;border-radius:10px;background:var(--turmeric);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;
}
.topbar h1{font-size:1.15rem;font-weight:700;letter-spacing:.01em;}
.topbar .sub{font-size:.72rem;opacity:.85;margin-top:1px;}
.topbar .sub:empty{display:none;}
#view{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 110px;}
.tabbar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:var(--app-w);
  background:var(--surface);
  border-top:1px solid var(--line);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:30;
}
.tabbar button{
  flex:1; border:none; background:none; padding:10px 4px 8px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--ink-soft); font-size:.72rem; font-weight:600;
}
.tabbar button .ic{font-size:1.25rem; line-height:1;}
.tabbar button.active{color:var(--jade-dark);}
.tabbar button.active .ic{transform:translateY(-1px);}

/* ---- shared bits ---- */
.card{
  background:var(--surface); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:16px; margin-bottom:12px;
  border:1px solid rgba(44,70,63,0.06);
}
.pill{
  display:inline-flex; align-items:center; gap:4px;
  background:var(--surface-2); color:var(--jade-dark);
  border-radius:999px; padding:3px 10px; font-size:.72rem; font-weight:700;
}
.btn{
  border:none; border-radius:12px; padding:10px 16px; font-weight:700;
  font-size:.88rem; cursor:pointer;
}
.btn-primary{background:var(--jade); color:#fff;}
.btn-ghost{background:var(--surface-2); color:var(--jade-dark);}
.btn-danger{background:none; color:var(--chili); text-decoration:underline;}
.btn-block{width:100%; display:block; text-align:center;}
.row{display:flex; align-items:center;}
.between{justify-content:space-between;}
.gap8{gap:8px;} .gap6{gap:6px;} .gap4{gap:4px;}
.section-title{
  font-family:'Fraunces',serif; font-weight:700; font-size:1.02rem;
  color:var(--jade-dark); margin:18px 0 8px; display:flex; align-items:center; gap:6px;
}
.section-title:first-child{margin-top:0;}
.empty-hint{color:var(--ink-soft); font-size:.85rem; text-align:center; padding:18px 6px;}

/* stepper */
.stepper{display:inline-flex; align-items:center; gap:0; border:1.5px solid var(--jade); border-radius:999px; overflow:hidden; flex:none; max-width:100%;}
.stepper button{
  width:24px; height:24px; border:none; background:var(--jade); color:#fff;
  font-size:.9rem; font-weight:700; cursor:pointer; line-height:1;
}
.stepper .val{
  min-width:56px; text-align:center; font-weight:800; font-size:.68rem;
  color:var(--jade-dark); background:#fff; padding:0 2px;
}

/* plan tab */
.week-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
.week-nav button{background:var(--surface); border:1px solid var(--line); border-radius:10px; width:40px; height:40px; font-size:1.15rem; color:var(--jade-dark);}
.week-range{font-family:'Fraunces',serif; font-weight:700; font-size:1.15rem;}
.days-wrap{display:flex; flex-direction:column;}
.day-card{background:var(--surface); border-radius:14px; padding:16px 16px; margin-bottom:10px; border:1px solid rgba(44,70,63,.06);}
.day-card.today{border-color:var(--turmeric); box-shadow:0 0 0 2px rgba(232,163,61,.25);}
.day-head{display:flex; align-items:baseline; gap:10px; margin-bottom:10px;}
.day-head .dow{font-family:'Fraunces',serif; font-weight:900; font-size:1.3rem; color:var(--jade-dark);}
.day-head .date{font-size:.92rem; color:var(--ink-soft);}
.slot{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface-2); border-radius:10px; padding:12px 12px; gap:8px;
}
.slot .content{flex:1; font-size:1.05rem; font-weight:500; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.slot.filled .content{color:var(--jade-dark); font-weight:700;}
.slot .clear-x{border:none; background:none; color:var(--chili); font-size:1.15rem; padding:2px 6px; cursor:pointer;}
.slot .add-btn{border:none;background:none;color:var(--ink-soft);font-size:.85rem;flex:1;text-align:left;cursor:pointer;}
.dish-list{display:flex; flex-direction:column; gap:8px;}
.dish-list .slot{margin:0;}
.dish-list .slot .content{white-space:normal;}
.add-dish-btn{
  border:1.5px dashed var(--line); background:none; color:var(--jade-dark);
  font-size:1.15rem; font-weight:800; text-align:center; cursor:pointer;
  padding:10px 2px; margin-top:8px; border-radius:10px; width:100%;
}
.add-dish-btn:active{background:var(--surface-2);}
.plan-actions{padding-top:12px; display:flex; flex-direction:column; gap:10px;}

/* recipes tab */
.search-wrap{display:flex; gap:8px; margin-bottom:14px;}
.search-wrap input{
  flex:1; border:1.5px solid var(--line); background:var(--surface);
  border-radius:14px; padding:14px 16px; font-size:1.35rem; color:var(--ink);
}
.chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; margin-bottom:14px;}
.chip{
  flex:none; padding:11px 20px; border-radius:999px; border:1.5px solid var(--line);
  background:var(--surface); color:var(--ink-soft); font-size:1.2rem; font-weight:700; cursor:pointer;
  white-space:nowrap;
}
.chip.active{background:var(--jade); border-color:var(--jade); color:#fff;}
.recipe-card{padding:22px 20px; margin-bottom:16px;}
.recipe-card .r-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.recipe-card .r-title{font-family:'Fraunces',serif; font-weight:700; font-size:1.4rem; display:flex; align-items:center; gap:6px; flex:1 1 auto; min-width:0;}
.recipe-card .r-cat-ic{font-size:1.5rem; flex:none;}
.ing-panel{
  background:rgba(62,98,89,.09);
  border-radius:14px;
  padding:12px 16px;
  margin-top:14px;
}
.panel-label{
  font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em;
  color:var(--jade-dark); opacity:.75; margin-bottom:2px;
}
.ing-panel .ing-list{margin-top:2px;}
.ing-list{list-style:none; margin:14px 0 0; padding:0; font-size:1.3rem;}
.ing-panel .ing-list li{border-bottom-color:rgba(62,98,89,.15);}
.method-panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 16px 14px;
  margin-top:12px;
}
.method-panel .steps-toggle{margin-top:0;}
.method-panel .steps-list{margin-top:10px;}
.method-panel .r-note{margin-top:10px;}
.ing-list li{display:grid; grid-template-columns:3fr 1fr; align-items:baseline; gap:10px; padding:8px 0; border-bottom:1px dashed var(--line);}
.ing-list li > span:first-child{display:flex; align-items:baseline; gap:5px; overflow-wrap:anywhere;}
.ing-list li:last-child{border-bottom:none;}
.ing-list .g{color:var(--ink-soft); font-size:1.05rem; margin-right:2px;}
.ing-divider{
  display:block !important; justify-content:flex-start !important;
  padding:14px 0 6px !important; margin-top:2px; border-bottom:none !important;
  font-size:1.05rem; font-weight:800; letter-spacing:.05em; text-transform:uppercase;
  color:var(--jade-dark); border-top:1px dashed var(--line);
}
.ing-list li:first-child.ing-divider{border-top:none; margin-top:0; padding-top:0 !important;}
.ing-qty{font-weight:700; color:var(--jade-dark); white-space:nowrap; text-align:right; font-size:.88rem;}
.steps-toggle{background:none;border:none;color:var(--jade-dark);font-weight:700;font-size:1.2rem;margin-top:14px;cursor:pointer;padding:0;}
.steps-list{margin:14px 0 0; padding-left:1.2em; font-size:1.25rem; line-height:1.6; color:var(--ink);}
.r-note{font-size:1.2rem; color:var(--ink-soft); margin-top:12px; font-style:italic;}
.r-actions{display:flex; gap:18px; margin-top:16px; flex-wrap:wrap;}
.r-actions button{border:none; background:none; font-weight:700; font-size:1.2rem; cursor:pointer; padding:0;}
.act-add{color:var(--jade-dark);}
.act-edit{color:var(--ink-soft);}
.act-del{color:var(--chili);}

.fab{
  position:fixed; right:calc(50% - (var(--app-w) / 2) + 18px); bottom:calc(78px + env(safe-area-inset-bottom,0px));
  width:52px; height:52px; border-radius:16px; background:var(--chili); color:#fff;
  border:none; font-size:1.6rem; box-shadow:0 8px 20px rgba(193,68,14,.35); cursor:pointer; z-index:25;
}
.fab-ai{
  bottom:calc(140px + env(safe-area-inset-bottom,0px));
  background:var(--jade); font-size:1.3rem; box-shadow:0 8px 20px rgba(44,70,63,.35);
}
@media (max-width:560px){ .fab{right:18px;} }

/* shopping tab */
.shop-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:8px;}
.progress-wrap{background:var(--surface-2); border-radius:999px; height:8px; overflow:hidden; margin:8px 0 16px;}
.progress-bar{height:100%; background:var(--turmeric); border-radius:999px; transition:width .25s ease;}
.shop-group-title{
  font-family:'Fraunces',serif; font-weight:700; font-size:1rem; color:var(--jade-dark);
  margin:16px 0 8px; display:flex; align-items:center; gap:6px;
}
.shop-item{
  display:flex; align-items:center; gap:12px; background:var(--surface);
  border-radius:14px; padding:14px; margin-bottom:8px; border:1px solid rgba(44,70,63,.06);
}
.shop-item.checked{opacity:.45;}
.shop-item.checked .shop-name{text-decoration:line-through;}
.shop-check{
  width:28px; height:28px; border-radius:8px; border:2px solid var(--jade); flex:none;
  display:flex; align-items:center; justify-content:center; background:#fff; cursor:pointer; font-size:1.1rem; color:var(--jade);
}
.shop-item.checked .shop-check{background:var(--jade); color:#fff;}
.shop-name{flex:1; font-size:1.12rem; font-weight:700; color:var(--ink);}
.shop-qty{font-size:1.05rem; font-weight:800; color:var(--jade-dark); white-space:nowrap;}
.shop-note-del{border:none;background:none;color:var(--chili);font-size:1.1rem;padding:2px 4px;cursor:pointer;}
.add-custom{display:flex; gap:8px; margin-top:14px;}
.add-custom input{flex:1; border:1.5px solid var(--line); background:var(--surface); border-radius:12px; padding:10px 12px; font-size:.95rem;}
.shop-actions{display:flex; gap:10px; margin-top:18px;}

/* modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(38,42,36,.55); z-index:50;
  display:flex; align-items:flex-end; justify-content:center;
}
.modal-sheet{
  background:var(--surface); width:100%; max-width:var(--app-w); border-radius:22px 22px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom,0px)); max-height:88vh; overflow-y:auto;
  animation:slideup .22s ease;
}
@keyframes slideup{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.modal-head h3{font-size:1.1rem;}
.modal-close{border:none; background:var(--surface-2); width:32px; height:32px; border-radius:10px; font-size:1rem; color:var(--ink-soft); cursor:pointer;}
.field{margin-bottom:12px;}
.field label{display:block; font-size:.78rem; font-weight:700; color:var(--ink-soft); margin-bottom:5px;}
.field input[type=text], .field input[type=number], .field select, .field textarea{
  width:100%; border:1.5px solid var(--line); background:#fff; border-radius:10px;
  padding:9px 10px; font-size:.9rem; font-family:inherit; color:var(--ink);
}
.field textarea{min-height:80px; resize:vertical;}
.ing-row{display:grid; grid-template-columns:26px 2.2fr 1fr .9fr 1.2fr auto; gap:6px; margin-bottom:6px; align-items:center;}
.ing-row.divider-row{grid-template-columns:26px 1fr auto;}
.move-col{display:flex; flex-direction:column; gap:2px;}
.move-col button{border:none; background:var(--surface-2); color:var(--jade-dark); font-size:.55rem; line-height:1; padding:3px 0; border-radius:5px; cursor:pointer; width:26px;}
.drag-handle{
  width:26px; height:36px; display:flex; align-items:center; justify-content:center;
  color:var(--ink-soft); font-size:1.15rem; cursor:grab; touch-action:none;
  user-select:none; -webkit-user-select:none; border-radius:6px;
}
.drag-handle:active{cursor:grabbing; background:var(--surface-2);}
.ing-row.dragging{opacity:.55; box-shadow:0 6px 14px rgba(0,0,0,.15); border-radius:8px; background:var(--surface);}
.ing-divider-label{font-weight:700; color:var(--jade-dark); background:var(--surface-2) !important;}
.ing-row input, .ing-row select{padding:7px 6px; font-size:.78rem;}
.ing-row .rm{border:none;background:none;color:var(--chili);font-size:1.1rem;cursor:pointer;}
/* inspire tab */
.reel-card{
  position:relative; overflow:hidden;
  background:linear-gradient(135deg, var(--jade) 0%, var(--jade-dark) 100%);
  border-radius:var(--radius); padding:30px 20px; text-align:center; color:#fff;
  margin-bottom:14px; box-shadow:var(--shadow);
}
.reel-card::before{
  content:''; position:absolute; inset:8px; border:2px dashed rgba(255,255,255,.28);
  border-radius:calc(var(--radius) - 6px); pointer-events:none;
}
.reel-label{font-size:.74rem; text-transform:uppercase; letter-spacing:.09em; opacity:.8; margin-bottom:12px; font-weight:700;}
.reel-display{display:flex; flex-direction:column; align-items:center; gap:8px; min-height:64px; justify-content:center;}
.reel-ic{font-size:2.5rem; line-height:1;}
.reel-name{font-family:'Fraunces',serif; font-weight:800; font-size:1.25rem; line-height:1.3;}
.spin-btn{font-size:1rem; padding:13px 16px;}
.spin-btn[disabled]{opacity:.65;}
.inspire-result{margin-top:14px;}
.pick-list{max-height:40vh; overflow-y:auto; border:1px solid var(--line); border-radius:12px;}
.pick-item{padding:11px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
.pick-item:last-child{border-bottom:none;}
.pick-item:active{background:var(--surface-2);}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">🍲</div>
      <div>
        <h1>Our Dinner Plan</h1>
        <div class="sub" id="topbarSub">Weekly menu · scalable servings · shopping list</div>
      </div>
    </div>
    <div style="position:relative;">
      <button class="settings-btn" data-act="open-api-key" title="Settings">⚙️</button>
      <span id="syncDot" style="position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:transparent;border:1.5px solid #fff;pointer-events:none;"></span>
    </div>
  </header>
  <main id="view"></main>
  <button class="fab fab-ai" id="fabAiBtn" style="display:none;">✨</button>
  <button class="fab" id="fabBtn" style="display:none;">＋</button>
  <nav class="tabbar">
    <button data-tab="plan" class="tab-btn"><span class="ic">🗓️</span>Weekly Plan</button>
    <button data-tab="recipes" class="tab-btn"><span class="ic">📖</span>Recipes</button>
    <button data-tab="inspire" class="tab-btn"><span class="ic">🎲</span>Inspire</button>
    <button data-tab="shopping" class="tab-btn"><span class="ic">🧾</span>Shopping List</button>
  </nav>
</div>
<div id="modal-root"></div>

<script>
/* =============== Data model =============== */
const STORAGE_KEY = 'dinnerPlanState_en_v1';
const GROUP_META = {
  veg:{label:'Vegetables', ic:'🥬'},
  meat:{label:'Meat', ic:'🥩'},
  seafood:{label:'Seafood', ic:'🦐'},
  season:{label:'Seasonings', ic:'🧂'},
  staple:{label:'Pantry & Staples', ic:'🍚'},
  other:{label:'Other', ic:'🧺'}
};
const CAT_META = {
  main:{label:'Mains', ic:'🍚'},
  soup:{label:'Soups',   ic:'🍜'},
  side:{label:'Sides', ic:'🥗'},
  eatout:{label:'Eating Out', ic:'🥡'}
};
const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DOW_COLORS = ['#3E6259','#C1440E','#E8A33D','#4E7A8C','#8C5A7C','#6B7F3E','#A65C3E'];

function seedRecipes(){
  return [
    {id:'r1', category:'main', name:'Scallion Beef Rice Bowl', baseServings:2, note:'Marinate the beef for 10 minutes before searing over high heat.',
     ingredients:[
       {name:'Sliced beef', qty:200, unit:'g', group:'meat'},
       {name:'Scallions', qty:2, unit:'stalks', group:'veg'},
       {name:'Minced garlic', qty:1, unit:'tbsp', group:'season'},
       {name:'Soy sauce', qty:2, unit:'tbsp', group:'season'},
       {name:'Rice wine', qty:1, unit:'tbsp', group:'season'},
       {name:'Cooked rice', qty:2, unit:'bowls', group:'staple'},
       {name:'Cornstarch', qty:1, unit:'tsp', group:'season'}
     ],
     steps:['Toss the beef with soy sauce, rice wine, and cornstarch; marinate 10 minutes','Sear the garlic, then stir-fry the beef over high heat until browned and set aside','Add the scallions and stir-fry until fragrant, then return the beef to the pan','Spoon everything over the rice and serve']},
    {id:'r2', category:'main', name:'Tomato & Egg Rice Bowl', baseServings:2, note:'',
     ingredients:[
       {name:'Eggs', qty:4, unit:'', group:'other'},
       {name:'Tomatoes', qty:3, unit:'', group:'veg'},
       {name:'Chopped scallion', qty:1, unit:'bunch', group:'veg'},
       {name:'Sugar', qty:1, unit:'tsp', group:'season'},
       {name:'Salt', qty:0.5, unit:'tsp', group:'season'},
       {name:'Cooked rice', qty:2, unit:'bowls', group:'staple'}
     ],
     steps:['Scramble the eggs until just set, then set aside','Cook the tomato wedges until they release their juices, season with sugar and salt','Return the eggs to the pan and toss together, then top with scallion']},
    {id:'r3', category:'main', name:'Taiwanese Braised Pork Rice', baseServings:2, note:'Save the braising liquid — it makes great braised eggs the next day.',
     ingredients:[
       {name:'Ground pork', qty:300, unit:'g', group:'meat'},
       {name:'Shallots', qty:6, unit:'cloves', group:'veg'},
       {name:'Soy sauce', qty:4, unit:'tbsp', group:'season'},
       {name:'Rock sugar', qty:1, unit:'tbsp', group:'season'},
       {name:'Five-spice powder', qty:1, unit:'tsp', group:'season'},
       {name:'Cooked rice', qty:2, unit:'bowls', group:'staple'}
     ],
     steps:['Finely chop the shallots and fry until golden','Add the ground pork and cook until browned and crumbly','Stir in soy sauce, rock sugar, five-spice, and water; simmer 40 minutes']},
    {id:'r4', category:'soup', name:'Clam & Loofah Soup', baseServings:2, note:'Let the clams purge sand in salted water for 2 hours first.',
     ingredients:[
       {name:'Clams', qty:300, unit:'g', group:'seafood'},
       {name:'Loofah (luffa squash)', qty:1, unit:'', group:'veg'},
       {name:'Ginger, julienned', qty:1, unit:'small handful', group:'veg'},

function defaultState(){
  return {
    recipes: seedRecipes(),
    recipeServings: {},   // id -> current servings
    weeks: {},             // isoMonday -> {mon:{dinner:[...]}, tue:{...}, ...}
    viewWeekStart: isoDate(getMonday(new Date())),
    shoppingChecked: {},   // key -> bool
    shoppingCustom: [],    // {id,name,checked}
    shoppingExcluded: {},  // key -> true (manually removed from auto-generated list)
    apiKey: ''              // Google Gemini API key for AI recipe import (stored locally only)
  };
}

let state = load();
migrateWeeks();
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const base = defaultState();
    return Object.assign(base, parsed);
  }catch(e){ return defaultState(); }
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(fb.user && !fb.applyingRemote){
    clearTimeout(fb.syncTimer);
    fb.syncTimer = setTimeout(pushToCloud, 500);
  }
}
// Upgrades older saved data so every day only has a single "dinner" dish list
// (lunch was removed; any dishes previously planned for lunch are merged in).
function migrateWeeks(){
  Object.keys(state.weeks).forEach(iso=>{
    const week = state.weeks[iso];
    ['mon','tue','wed','thu','fri','sat','sun'].forEach(dayKey=>{
      const day = week[dayKey] || {};
      const toArr = v => Array.isArray(v) ? v : (v && typeof v==='object' ? [v] : []);
      week[dayKey] = { dinner: toArr(day.dinner).concat(toArr(day.lunch)) };
    });
  });
}

/* =============== Date helpers =============== */
function getMonday(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = (day===0? -6 : 1-day);
  date.setDate(date.getDate()+diff);
  date.setHours(0,0,0,0);
  return date;
}
function isoDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(iso, n){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d;
}
function fmtShort(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function weekKey(i){ return ['mon','tue','wed','thu','fri','sat','sun'][i]; }
function isSameDate(a,b){ return isoDate(a)===isoDate(b); }

function emptyWeek(){
  return {mon:{dinner:[]},tue:{dinner:[]},wed:{dinner:[]},
          thu:{dinner:[]},fri:{dinner:[]},sat:{dinner:[]},sun:{dinner:[]}};
}
function ensureWeek(iso){
  if(!state.weeks[iso]){
    state.weeks[iso] = emptyWeek();
  }
  return state.weeks[iso];
}

/* =============== Shared helpers =============== */
function recipeById(id){ return state.recipes.find(r=>r.id===id); }
function getServings(recipe){
  return state.recipeServings[recipe.id] || recipe.baseServings || 2;
}
function fmtQty(n){
  const rounded = Math.round(n*100)/100;
  return (rounded % 1 === 0) ? String(rounded) : String(rounded.toFixed(rounded*10%1===0?1:2));
}
function scaledIngredients(recipe){
  const cur = getServings(recipe);
  const ratio = cur / (recipe.baseServings||2);
  return recipe.ingredients.map(ing => ing.divider ? ing : ({...ing, qty: ing.qty*ratio}));
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =============== Weekly plan =============== */
function renderPlan(){
  const iso = state.viewWeekStart;
  const week = ensureWeek(iso);
  const startD = new Date(iso+'T00:00:00');
  const endD = addDays(iso,6);
  const today = new Date();
  let html = `
  <div class="week-nav">
    <button data-act="week-prev">‹</button>
    <div class="week-range">${fmtShort(startD)} – ${fmtShort(endD)}</div>
    <button data-act="week-next">›</button>
  </div>
  <div class="days-wrap">`;

  for(let i=0;i<7;i++){
    const dISO = isoDate(addDays(iso,i));
    const d = new Date(dISO+'T00:00:00');
    const key = weekKey(i);
    const day = week[key] || {};
    const isToday = isSameDate(d, today);
    const dc = DOW_COLORS[i];
    html += `<div class="day-card ${isToday?'today':''}" style="border-left:5px solid ${dc};">
      <div class="day-head"><span class="dow" style="color:${dc};">${DOW[i]}</span><span class="date">${fmtShort(d)}${isToday?' · Today':''}</span></div>
      ${renderSlot(iso,key,day.dinner)}
    </div>`;
  }

  html += `</div>
  <div class="plan-actions">
    <div class="row gap8">
      <button class="btn btn-ghost" data-act="copy-last-week" style="flex:1;">Copy Last Week</button>
      <button class="btn btn-danger" data-act="clear-week" style="flex:none;">Clear Week</button>
    </div>
    <button class="btn btn-primary btn-block" data-act="go-shopping">🧾 View This Week's Shopping List</button>
  </div>
  `;
  return html;
}

function renderSlot(iso, dayKey, entries){
  entries = entries || [];
  const rows = entries.map((entry, idx)=>{
    const text = entry.type==='recipe'
      ? `${(recipeById(entry.id)? CAT_META[recipeById(entry.id).category].ic : '')} ${escapeHtml(recipeById(entry.id)? recipeById(entry.id).name : '(recipe deleted)')}`
      : `✍️ ${escapeHtml(entry.text)}`;
    return `<div class="slot filled">
      <span class="content">${text}</span>
      <button class="clear-x" data-act="remove-dish" data-iso="${iso}" data-day="${dayKey}" data-idx="${idx}">✕</button>
    </div>`;
  }).join('');
  return `<div class="dish-list">${rows}</div>
  <button class="add-dish-btn" data-act="edit-slot" data-iso="${iso}" data-day="${dayKey}">＋</button>`;
}

function spin(){
  const list = inspireList();
  if(list.length===0 || inspireSpinning) return;
  inspireSpinning = true;
  render();
  let ticks = 0;
  const maxTicks = 14;
  const timer = setInterval(()=>{
    ticks++;
    const r = list[Math.floor(Math.random()*list.length)];
    const el = document.getElementById('inspireReel');
    if(el){
      el.innerHTML = `<span class="reel-ic">${r.category==='eatout'?'🥡':CAT_META[r.category].ic}</span><span class="reel-name">${escapeHtml(r.name)}</span>`;
    }
    if(ticks>=maxTicks){
      clearInterval(timer);
      const winner = list[Math.floor(Math.random()*list.length)];
      inspireResult = winner.id;
      inspireSpinning = false;
      render();
    }
  }, 90);
}

/* =============== Shopping list =============== */
function computeShoppingItems(){
  const iso = state.viewWeekStart;
  const week = ensureWeek(iso);
  const map = {}; // key -> {name,unit,group,qty}
  Object.values(week).forEach(day=>{
    (day.dinner||[]).forEach(entry=>{
      if(entry && entry.type==='recipe'){
        const r = recipeById(entry.id);
        if(!r || !r.ingredients) return;
        scaledIngredients(r).forEach(ing=>{
          if(ing.divider) return;
          const key = ing.name+'|'+ing.unit;
          if(!map[key]) map[key] = {name:ing.name, unit:ing.unit, group:ing.group, qty:0};
          map[key].qty += ing.qty;
        });
      }
    });
  });
  return Object.values(map);
}

function renderShopping(){
  const items = computeShoppingItems().filter(it => !state.shoppingExcluded[it.name+'|'+it.unit]);
  const iso = state.viewWeekStart;
  const startD = new Date(iso+'T00:00:00'); const endD = addDays(iso,6);

  const groups = {};
  items.forEach(it=>{
    const g = it.group || 'other';
    if(!groups[g]) groups[g]=[];
    groups[g].push(it);
  });

  const totalCount = items.length + state.shoppingCustom.length;
  const checkedCount = items.filter(it=>state.shoppingChecked[it.name+'|'+it.unit]).length
    + state.shoppingCustom.filter(c=>c.checked).length;

  let html = `
  <div class="shop-header">
    <div class="week-range">${fmtShort(startD)} – ${fmtShort(endD)} Shopping List</div>
    <button class="btn btn-ghost" data-act="refresh-shopping" style="font-size:.78rem;padding:7px 10px;">Refresh</button>
  </div>
  <div style="font-size:.82rem;color:var(--ink-soft);">${checkedCount} of ${totalCount} items checked off</div>
  <div class="progress-wrap"><div class="progress-bar" style="width:${totalCount? (checkedCount/totalCount*100):0}%"></div></div>
  `;

  if(totalCount===0){
    html += `<div class="empty-hint">No meals planned for this week yet.<br>Add recipes in “Weekly Plan” and your shopping list will build itself.</div>`;
  }

  Object.keys(GROUP_META).forEach(g=>{
    if(!groups[g] || groups[g].length===0) return;
    html += `<div class="shop-group-title">${GROUP_META[g].ic} ${GROUP_META[g].label}</div>`;
    groups[g].forEach(it=>{
      const key = it.name+'|'+it.unit;
      const checked = !!state.shoppingChecked[key];
      html += `<div class="shop-item ${checked?'checked':''}" data-act="toggle-item" data-key="${escapeHtml(key)}">
        <div class="shop-check">${checked?'✓':''}</div>
        <div class="shop-name">${escapeHtml(it.name)}</div>
        <div class="shop-qty">${fmtQty(it.qty)}${it.unit?(' '+escapeHtml(it.unit)):''}</div>
        <button class="shop-note-del" data-act="del-item" data-key="${escapeHtml(key)}">✕</button>
      </div>`;
    });
  });

  if(state.shoppingCustom.length){
    html += `<div class="shop-group-title">✍️ Custom Items</div>`;
    state.shoppingCustom.forEach(c=>{
      html += `<div class="shop-item ${c.checked?'checked':''}" data-act="toggle-custom" data-id="${c.id}">
        <div class="shop-check">${c.checked?'✓':''}</div>
        <div class="shop-name">${escapeHtml(c.name)}</div>
        <button class="shop-note-del" data-act="del-custom" data-id="${c.id}">✕</button>
      </div>`;
    });
  }

  html += `
  <div class="add-custom">
    <input type="text" id="customItemInput" placeholder="Add an item, e.g. paper towels">
    <button class="btn btn-primary" data-act="add-custom">Add</button>
  </div>
  <div class="shop-actions">
    <button class="btn btn-ghost" data-act="clear-checked" style="flex:1;">Clear Checked Items</button>
    <button class="btn btn-danger" data-act="clear-all-shopping">Clear Entire List</button>
  </div>
  `;
  return html;
}

/* =============== Event delegation =============== */
document.addEventListener('click', (e)=>{
  const t = e.target.closest('[data-act]');
  if(!t) return;
  const act = t.dataset.act;

  if(act==='week-prev'){ state.viewWeekStart = isoDate(addDays(state.viewWeekStart,-7)); save(); render(); }
  else if(act==='week-next'){ state.viewWeekStart = isoDate(addDays(state.viewWeekStart,7)); save(); render(); }
  else if(act==='clear-week'){
    if(confirm('Clear all planned meals for this week?')){
      state.weeks[state.viewWeekStart] = emptyWeek();
      save(); render();
    }
  }
  else if(act==='copy-last-week'){
    const lastIso = isoDate(addDays(state.viewWeekStart,-7));
    const lastWeek = state.weeks[lastIso];
    if(!lastWeek){ alert('No plan found for last week.'); return; }
    state.weeks[state.viewWeekStart] = JSON.parse(JSON.stringify(lastWeek));
    save(); render();
  }
  else if(act==='go-shopping'){ currentTab='shopping'; render(); }
  else if(act==='refresh-shopping'){ state.shoppingExcluded = {}; save(); render(); }
  else if(act==='remove-dish'){
    const week = ensureWeek(t.dataset.iso);
    week[t.dataset.day].dinner.splice(parseInt(t.dataset.idx),1);
    save(); render();
  }
  else if(act==='edit-slot'){
    pendingSlot = {iso:t.dataset.iso, day:t.dataset.day};
    openSlotPicker();
  }
  else if(act==='add-to-week'){
    pendingSlot = {presetRecipeId: t.dataset.id};
    openDayMealPicker(t.dataset.id);
  }
  else if(act==='filter-cat'){ recipeFilter.cat = t.dataset.cat; render(); }
  else if(act==='filter-cat-inspire'){ inspireFilter.cat = t.dataset.cat; inspireResult = null; render(); }
  else if(act==='spin'){ spin(); }
  else if(act==='serv-inc'){
    const r = recipeById(t.dataset.id);
    state.recipeServings[r.id] = Math.min(20, getServings(r)+1);
    save(); render();
  }
  else if(act==='serv-dec'){
    const r = recipeById(t.dataset.id);

  }
  else if(act==='del-item'){

  }

/* Press-and-drag reordering for ingredient rows (works for mouse, touch, and pen) */
let ingDragState = null;
let ingDragPointerId = null;
document.addEventListener('pointerdown', (e)=>{
  const handle = e.target.closest('.drag-handle');
  if(!handle) return;
  const row = handle.closest('.ing-row');
  const container = document.getElementById('ingRows');
  if(!row || !container || !container.contains(row)) return;
  e.preventDefault();
  ingDragState = {row, container};
  ingDragPointerId = e.pointerId;
  row.classList.add('dragging');
  try{ handle.setPointerCapture(e.pointerId); }catch(err){}
});
document.addEventListener('pointermove', (e)=>{
  if(!ingDragState || e.pointerId!==ingDragPointerId) return;
  const {row, container} = ingDragState;
  const siblings = Array.from(container.children).filter(el=> el!==row && el.classList.contains('ing-row'));
  let placed = false;
  for(const sib of siblings){
    const rect = sib.getBoundingClientRect();
    const mid = rect.top + rect.height/2;
    if(e.clientY < mid){ container.insertBefore(row, sib); placed = true; break; }
  }
  if(!placed) container.appendChild(row);
});
function endIngDrag(e){
  if(!ingDragState || (e.pointerId!==undefined && e.pointerId!==ingDragPointerId)) return;
  ingDragState.row.classList.remove('dragging');
  ingDragState = null; ingDragPointerId = null;
}
document.addEventListener('pointerup', endIngDrag);
document.addEventListener('pointercancel', endIngDrag);

/* ---- Parse a Firebase config: accepts strict JSON, or the JS object literal copied from the console ---- */
function parseFirebaseConfig(raw){
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){}
  try{
    const match = raw.match(/{[\s\S]*}/);
    if(!match) return null;
    let str = match[0]
      .replace(/([{,]\s*)([A-Za-z0-9_$]+)\s*:/g, '$1"$2":')
      .replace(/,(\s*[}\]])/g, '$1');
    return JSON.parse(str);
  }catch(e){ return null; }
}
function loadFirebaseConfig(){
  try{ return JSON.parse(localStorage.getItem('firebaseConfigV1')||'null'); }catch(e){ return null; }
}
function saveFirebaseConfigToStorage(cfg){ localStorage.setItem('firebaseConfigV1', JSON.stringify(cfg)); }

function saveFirebaseConfigFromForm(){
  const raw = document.getElementById('fbConfigInput').value.trim();
  const cfg = parseFirebaseConfig(raw);
  if(!cfg || !cfg.apiKey || !cfg.projectId){
    alert('Could not read that config. Make sure it\'s the full config object copied from the Firebase console (must include apiKey and projectId).');
    return;
  }
  saveFirebaseConfigToStorage(cfg);
  initFirebase(cfg).then(()=>{ closeModal(); openAPISettings(); });
}
function resetFirebaseConfig(){
  if(!confirm('Clear the Firebase settings? Data on this device is kept — it just stops syncing with other devices.')) return;
  if(fb.unsubscribe){ fb.unsubscribe(); }
  if(fb.auth && fb.authMod){ fb.authMod.signOut(fb.auth).catch(()=>{}); }
  localStorage.removeItem('firebaseConfigV1');
  fb = {app:null, auth:null, db:null, authMod:null, fsMod:null, user:null, ready:false, syncTimer:null, applyingRemote:false, unsubscribe:null};
  renderSyncStatus();
  closeModal(); openAPISettings();
}

/* ---- Firebase init & real-time sync ---- */
let fb = {app:null, auth:null, db:null, authMod:null, fsMod:null, user:null, ready:false, syncTimer:null, applyingRemote:false, unsubscribe:null};

async function initFirebase(cfg){
  try{
    const appMod = await import('https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js');
    const authMod = await import('https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js');
    const fsMod = await import('https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js');
    fb.app = appMod.initializeApp(cfg);
    fb.auth = authMod.getAuth(fb.app);
    fb.db = fsMod.getFirestore(fb.app);
    fb.authMod = authMod;
    fb.fsMod = fsMod;
    fb.ready = true;
    authMod.onAuthStateChanged(fb.auth, (user)=>{
      fb.user = user;
      if(user){ subscribeCloud(); }
      else if(fb.unsubscribe){ fb.unsubscribe(); fb.unsubscribe = null; }
      renderSyncStatus();
    });
    renderSyncStatus();
  }catch(err){
    alert('Firebase connection failed: ' + (err.message||err) + '\n\nPlease check the config you pasted.');
  }
}
async function signInWithGoogle(){
  if(!fb.ready){ alert('Please paste and save your Firebase config first.'); return; }
  try{
    const provider = new fb.authMod.GoogleAuthProvider();
    await fb.authMod.signInWithPopup(fb.auth, provider);
    closeModal(); openAPISettings();
  }catch(err){
    alert('Sign-in failed: ' + (err.message||err) + '\n\nMake sure Google sign-in is enabled under Authentication in the Firebase console, and this site\'s domain is in the Authorized domains list.');
  }
}
function signOutCloud(){
  if(fb.auth && fb.authMod){ fb.authMod.signOut(fb.auth); }
  closeModal(); openAPISettings();
}
function subscribeCloud(){
  if(!fb.user || !fb.db || !fb.fsMod) return;
  if(fb.unsubscribe) fb.unsubscribe();
  const ref = fb.fsMod.doc(fb.db, 'users', fb.user.uid, 'app', 'state');
  fb.unsubscribe = fb.fsMod.onSnapshot(ref, (snap)=>{
    if(snap.exists()){
      fb.applyingRemote = true;
      Object.assign(state, snap.data());
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
      fb.applyingRemote = false;
    }else{
      pushToCloud();
    }
    renderSyncStatus();
  }, (err)=>{ console.error('Cloud sync listener failed', err); });
}
function pushToCloud(){
  if(!fb.user || !fb.db || !fb.fsMod || fb.applyingRemote) return;
  const ref = fb.fsMod.doc(fb.db, 'users', fb.user.uid, 'app', 'state');
  const payload = {
    recipes: state.recipes,
    recipeServings: state.recipeServings,
    weeks: state.weeks,
    viewWeekStart: state.viewWeekStart,
    shoppingChecked: state.shoppingChecked,
    shoppingCustom: state.shoppingCustom,
    shoppingExcluded: state.shoppingExcluded
  };
  fb.fsMod.setDoc(ref, payload).catch(err=> console.error('Cloud sync write failed', err));
}
function renderSyncStatus(){
  const dot = document.getElementById('syncDot');
  if(!dot) return;
  if(fb.user){ dot.style.background = '#6B7F3E'; dot.title = 'Connected & syncing: ' + (fb.user.email||''); }
  else if(fb.ready){ dot.style.background = '#E8A33D'; dot.title = 'Firebase connected, not signed in'; }
  else{ dot.style.background = 'transparent'; dot.title = ''; }
}

function fileToResizedBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 1600;
        let {width, height} = img;
        if(width > height && width > maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
        else if(height > maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        resolve({base64: dataUrl.split(',')[1], mediaType:'image/jpeg'});
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleAIFileInput(e){
  const files = Array.from(e.target.files || []);
  for(const f of files){
    if(aiImportImages.length >= 3) break;
    try{ aiImportImages.push(await fileToResizedBase64(f)); }catch(err){ /* skip unreadable file */ }
  }
  e.target.value = '';
  renderAIThumbs();
}

function normalizeAIRecipe(p){
  const cat = ['main','soup','side','eatout'].includes(p.category) ? p.category : 'main';
  const ingredients = Array.isArray(p.ingredients) ? p.ingredients.map(i=>{
    if(i && i.divider) return {divider:true, label:String(i.label||'').slice(0,30)};
    return {
      name: String(i?.name||'').slice(0,40),
      qty: isNaN(parseFloat(i?.qty)) ? 1 : parseFloat(i.qty),
      unit: String(i?.unit||''),
      group: ['veg','meat','seafood','season','staple','other'].includes(i?.group) ? i.group : 'other'
    };
  }).filter(i => i.divider || i.name) : [];
  return {
    id:null,
    name: String(p.name||'').slice(0,60) || 'Untitled Recipe',
    category: cat,
    baseServings: parseInt(p.baseServings)||2,
    note: String(p.note||''),
    ingredients: cat==='eatout' ? [] : ingredients,
    steps: cat==='eatout' ? [] : (Array.isArray(p.steps) ? p.steps.map(s=>String(s)) : [])
  };
}

async function callAIImport(){
  if(!state.apiKey){ openAPISettings(); return; }
  const text = document.getElementById('aiTextInput').value.trim();
  if(aiImportImages.length===0 && !text){ alert('Please provide at least one photo or some text.'); return; }

  const btn = document.getElementById('aiSubmitBtn');
  btn.disabled = true; btn.textContent = '✨ AI is analyzing… please wait';

  const promptText = `You are a professional recipe organizing assistant. Based on the photo(s) and/or text I provide, organize it into structured recipe data.
Rules:
- category must be one of: main (a staple/main dish), soup, side (a side dish), eatout (dining out, no ingredients or steps)
- each ingredient's group must be one of: veg, meat, seafood, season (seasoning/condiment), staple (pantry/dry goods), other
- if the content clearly has stages (e.g. marinate first, then make the sauce, add something right before serving), insert divider objects into the ingredients array like {"divider":true,"label":"Stage name"} to group them — you can use multiple dividers
- baseServings should be the serving size this recipe was written for (an integer); use 2 if you can't tell
- qty must be a number (not text or a fraction symbol); unit is text (e.g. g, tbsp, cloves) — leave it as an empty string if there's no unit
- steps is an array of instructions, one step per element
- return ONLY raw JSON, no explanation text, no markdown \`\`\` fences
Example JSON shape:
{"name":"Recipe name","category":"main","baseServings":2,"ingredients":[{"name":"ingredient","qty":2,"unit":"cloves","group":"other"},{"divider":true,"label":"Just before serving"},{"name":"scallion","qty":1,"unit":"bunch","group":"veg"}],"steps":["Step one","Step two"],"note":"notes"}`;

  const parts = [];
  aiImportImages.forEach(img=>{
    parts.push({inline_data:{mime_type:img.mediaType, data:img.base64}});
  });
  parts.push({text: promptText + (text ? `\n\nText I provided:\n${text}` : '')});

  try{
    const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent', {
      method:'POST',
      headers:{
        'content-type':'application/json',
        'x-goog-api-key': state.apiKey
      },
      body: JSON.stringify({
        contents:[{parts}],
        generationConfig:{ responseMimeType:'application/json' }
      })
    });
    const data = await resp.json();
    if(data.error){ throw new Error(data.error.message || 'API error'); }
    if(!data.candidates || !data.candidates.length){
      throw new Error(data.promptFeedback?.blockReason ? `Blocked by Gemini safety filters (${data.promptFeedback.blockReason})` : 'No response from Gemini');
    }
    const textOut = (data.candidates[0].content?.parts||[]).map(p=>p.text||'').join('\n').trim();
    const cleaned = textOut.replace(/^```json/i,'').replace(/^```/,'').replace(/```\s*$/,'').trim();
    const parsed = JSON.parse(cleaned);
    const draft = normalizeAIRecipe(parsed);
    closeModal();
    openRecipeForm(draft);
  }catch(err){
    alert('AI import failed: ' + (err.message||err) + '\n\nPlease check your API key and quota, or try again shortly.');
    btn.disabled = false; btn.textContent = '✨ Analyze & Create Recipe';
  }
}

/* =============== Generic modal =============== */
function openModal(innerHtml){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay" data-act="overlay"><div class="modal-sheet">${innerHtml}</div></div>`;
  root.querySelector('.modal-overlay').addEventListener('click', (e)=>{ if(e.target.dataset.act==='overlay') closeModal(); });
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; pendingSlot=null; }

/* =============== Service worker & startup =============== */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
render();
renderSyncStatus();
const savedFbConfig = loadFirebaseConfig();
if(savedFbConfig){ initFirebase(savedFbConfig); }
</script>
